version: '3.8'

services:

  # ── Gateway CORECONF unificado ──────────────────────────────────────────────
  # Acepta: FETCH, GET, iPATCH, PUT, DELETE en /c
  # Acceso desde host: coap://localhost:5683/c
  coreconf_gateway:
    image: iot-coreconf
    container_name: coreconf_gateway
    hostname: gateway
    ports:
      - "5683:5683/udp"
    networks:
      iot_network:
        ipv4_address: 172.20.0.10
    command: ./iot_apps/coreconf_server
    volumes:
      - ./logs:/iot_device/logs
    restart: unless-stopped

  # ── Dispositivo IoT 1 — sensor de temperatura (CLI interactivo) ─────────────
  # Conectar: docker attach coreconf_device_1
  # Salir sin matar el contenedor: Ctrl-P Ctrl-Q
  coreconf_device_1:
    image: iot-coreconf
    container_name: coreconf_device_1
    hostname: device-temp
    stdin_open: true
    tty: true
    environment:
      - GATEWAY_HOST=172.20.0.10
      - GATEWAY_PORT=5683
    networks:
      iot_network:
        ipv4_address: 172.20.0.11
    command: ./iot_apps/coreconf_cli temperature sensor-temp-001
    depends_on:
      - coreconf_gateway

  # ── Dispositivo IoT 2 — sensor de humedad (CLI interactivo) ─────────────────
  # Conectar: docker attach coreconf_device_2
  coreconf_device_2:
    image: iot-coreconf
    container_name: coreconf_device_2
    hostname: device-humidity
    stdin_open: true
    tty: true
    environment:
      - GATEWAY_HOST=172.20.0.10
      - GATEWAY_PORT=5683
    networks:
      iot_network:
        ipv4_address: 172.20.0.12
    command: ./iot_apps/coreconf_cli humidity sensor-hum-001
    depends_on:
      - coreconf_gateway

networks:
  iot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  logs:
