version: '3.8'

# CORECONF architecture (draft-ietf-core-comi-20)
# ─────────────────────────────────────────────────────────────
# One CORECONF server = one unified datastore at /c (draft §2.4)
# The datastore can contain temperature, humidity, and other nodes.
# There is no ?id= routing: the client accesses /c directly.
#
# Usage:
#   docker compose up -d --build
#   docker attach coreconf_client
#   > store temperature 22.5    ← PUT /c — initialize datastore
#   > ipatch 30 humidity        ← iPATCH /c — add humidity node
#   > ipatch 31 60.5            ← iPATCH /c — set humidity value
#   > get                       ← GET /c   — see temperature and humidity
#   > fetch 20 31               ← FETCH /c — only those two SIDs
# ─────────────────────────────────────────────────────────────

services:

  # ── CORECONF server — unified datastore at /c ─────────────────────────────
  coreconf_server:
    image: iot-coreconf
    container_name: coreconf_server
    hostname: server
    ports:
      - "5683:5683/udp"
      - "5684:5684/udp"
    networks:
      iot_network:
        ipv4_address: 172.20.0.10
    command: ./iot_apps/coreconf_server
    environment:
      - CORECONF_TLS_MODE=cert
    volumes:
      - ./logs:/iot_device/logs
    restart: unless-stopped

  # ── CORECONF client — interactive REPL ───────────────────────────────────
  # Connect: docker attach coreconf_client
  # Detach without stopping container: Ctrl-P Ctrl-Q
  coreconf_client:
    image: iot-coreconf
    container_name: coreconf_client
    hostname: client
    stdin_open: true
    tty: true
    environment:
      - SERVER_HOST=172.20.0.10
      - SERVER_PORT=5684
      - CORECONF_TLS_MODE=cert
    networks:
      iot_network:
        ipv4_address: 172.20.0.11
    command: ./iot_apps/coreconf_cli temperature
    depends_on:
      - coreconf_server

networks:
  iot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  logs:
