version: '3.8'

# Arquitectura CORECONF (draft-ietf-core-comi-20)
# ─────────────────────────────────────────────────────────────
# Un servidor CORECONF = UN único datastore en /c  (draft §2.4)
# El datastore puede tener nodos de temperatura, humedad, etc.
# No hay routing ?id=: el cliente accede directamente al /c del servidor.
#
# Usar:
#   docker compose up -d --build
#   docker attach coreconf_client
#   > store temperature 22.5    ← PUT /c — inicializa el datastore
#   > ipatch 30 humidity        ← iPATCH /c — añade nodo humedad
#   > ipatch 31 60.5            ← iPATCH /c — añade valor humedad
#   > get                       ← GET /c   — ve temperature Y humidity
#   > fetch 20 31               ← FETCH /c — solo esos dos SIDs
# ─────────────────────────────────────────────────────────────

services:

  # ── Servidor CORECONF — datastore único en /c ────────────────────────────
  coreconf_server:
    image: iot-coreconf
    container_name: coreconf_server
    hostname: server
    ports:
      - "5683:5683/udp"
    networks:
      iot_network:
        ipv4_address: 172.20.0.10
    command: ./iot_apps/coreconf_server
    volumes:
      - ./logs:/iot_device/logs
    restart: unless-stopped

  # ── Cliente CORECONF — REPL interactivo ─────────────────────────────────
  # Conectar: docker attach coreconf_client
  # Salir sin matar el contenedor: Ctrl-P Ctrl-Q
  coreconf_client:
    image: iot-coreconf
    container_name: coreconf_client
    hostname: client
    stdin_open: true
    tty: true
    environment:
      - SERVER_HOST=172.20.0.10
      - SERVER_PORT=5683
    networks:
      iot_network:
        ipv4_address: 172.20.0.11
    command: ./iot_apps/coreconf_cli temperature
    depends_on:
      - coreconf_server

networks:
  iot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  logs:
